sample:
  description: Zephyr Firmware Lab - event-driven LED control with button interrupt
  name: zephyr firmware lab
common:
  min_ram: 16
  min_flash: 256
  tags: embedded firmware interrupt event-driven
  integration_platforms:
    - esp32c3_devkitc
  harness: console
  harness_config:
    type: multi_line
    ordered: false
    regex:
      - "\\[MAIN\\] Application initialized"
      - "\\[LED THREAD\\] Running"
      - "\\[LOGGING THREAD\\] Started"
tests:
  sample.zephyr_firmware_lab.basic:
    tags: embedded firmware interrupt
